name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      release_name:
        description: Release title
        required: false
        default: ""
        type: string
      qt_version:
        description: Qt version
        required: false
        default: "6.8.3"
        type: string
      prerelease:
        description: Mark release as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    env:
      BUILD_TYPE: Release
      PACKAGE_DIR: ${{ github.workspace }}\package\ZcAILib
      ARCHIVE_NAME: ZcAILib-${{ inputs.tag }}-windows-msvc.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "Ninja"
          -DCMAKE_BUILD_TYPE=${env:BUILD_TYPE}

      - name: Build
        shell: pwsh
        run: cmake --build build --config ${env:BUILD_TYPE}

      - name: Install package layout
        shell: pwsh
        run: >
          cmake --install build
          --config ${env:BUILD_TYPE}
          --prefix "${env:PACKAGE_DIR}"

      - name: Create zip archive
        shell: pwsh
        run: |
          $archivePath = Join-Path $env:GITHUB_WORKSPACE $env:ARCHIVE_NAME
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive `
            -Path $env:PACKAGE_DIR `
            -DestinationPath $archivePath `
            -CompressionLevel Optimal

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ github.workspace }}\${{ env.ARCHIVE_NAME }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: ${{ github.workspace }}\${{ env.ARCHIVE_NAME }}
