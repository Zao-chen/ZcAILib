name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      release_name:
        description: Release title
        required: false
        default: ""
        type: string
      toolchain:
        description: Build toolchain
        required: false
        default: "mingw"
        type: choice
        options:
          - mingw
          - msvc
      qt_version:
        description: Qt version
        required: false
        default: "6.8.3"
        type: string
      qt_arch:
        description: Qt architecture, leave empty to auto-select by toolchain and Qt version
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark release as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    env:
      BUILD_TYPE: Release
      PACKAGE_DIR: ${{ github.workspace }}\package\ZcAILib
      ARCHIVE_NAME: ZcAILib-${{ inputs.tag }}-windows-${{ inputs.toolchain }}.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        if: ${{ inputs.toolchain == 'msvc' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup MSYS2
        if: ${{ inputs.toolchain == 'mingw' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Resolve Qt architecture
        id: qt_arch
        shell: pwsh
        run: |
          $qtVersion = "${{ inputs.qt_version }}"
          $qtArch = "${{ inputs.qt_arch }}"
          $toolchain = "${{ inputs.toolchain }}"

          if ([string]::IsNullOrWhiteSpace($qtArch)) {
            if ($toolchain -eq "mingw") {
              $qtArch = "win64_mingw"
            } else {
              $parts = $qtVersion.Split('.')
              $major = if ($parts.Length -gt 0) { [int]$parts[0] } else { 0 }
              $minor = if ($parts.Length -gt 1) { [int]$parts[1] } else { 0 }

              if ($major -gt 6 -or ($major -eq 6 -and $minor -ge 8)) {
                $qtArch = "win64_msvc2022_64"
              } elseif ($major -eq 6 -or ($major -eq 5 -and $minor -ge 15)) {
                $qtArch = "win64_msvc2019_64"
              } elseif ($major -eq 5 -and $minor -ge 9) {
                $qtArch = "win64_msvc2017_64"
              } elseif ($major -eq 5 -and $minor -ge 6) {
                $qtArch = "win64_msvc2015_64"
              } else {
                $qtArch = "win64_msvc2013_64"
              }
            }
          }

          "qt_arch=$qtArch" >> $env:GITHUB_OUTPUT
          "Using Qt architecture: $qtArch for toolchain: $toolchain"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version }}
          host: windows
          target: desktop
          arch: ${{ steps.qt_arch.outputs.qt_arch }}
          cache: true

      - name: Configure
        if: ${{ inputs.toolchain == 'msvc' }}
        shell: cmd
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=%BUILD_TYPE%

      - name: Build
        if: ${{ inputs.toolchain == 'msvc' }}
        shell: cmd
        run: cmake --build build --config %BUILD_TYPE%

      - name: Install package layout
        if: ${{ inputs.toolchain == 'msvc' }}
        shell: cmd
        run: cmake --install build --config %BUILD_TYPE% --prefix "%PACKAGE_DIR%"

      - name: Configure MinGW
        if: ${{ inputs.toolchain == 'mingw' }}
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_PREFIX_PATH="$(cygpath -u "$QT_ROOT_DIR")"

      - name: Build MinGW
        if: ${{ inputs.toolchain == 'mingw' }}
        shell: msys2 {0}
        run: cmake --build build --config "${BUILD_TYPE}"

      - name: Install MinGW package layout
        if: ${{ inputs.toolchain == 'mingw' }}
        shell: msys2 {0}
        run: |
          cmake --install build \
            --config "${BUILD_TYPE}" \
            --prefix "$(cygpath -u "$PACKAGE_DIR")"

      - name: Create zip archive
        shell: pwsh
        run: |
          $archivePath = Join-Path $env:GITHUB_WORKSPACE $env:ARCHIVE_NAME
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive `
            -Path $env:PACKAGE_DIR `
            -DestinationPath $archivePath `
            -CompressionLevel Optimal

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ github.workspace }}\${{ env.ARCHIVE_NAME }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: ${{ github.workspace }}\${{ env.ARCHIVE_NAME }}
